<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncPad Whiteboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fafbfc; font-family: system-ui, -apple-system, sans-serif; }
    
    /* ── Toolbar ── */
    .toolbar {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 4px; padding: 6px 10px;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      z-index: 100; flex-wrap: wrap; justify-content: center;
    }
    .toolbar .sep { width: 1px; height: 24px; background: #e2e8f0; margin: 0 4px; }
    
    .tool-btn {
      width: 36px; height: 36px; border: 2px solid transparent; border-radius: 8px;
      background: transparent; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s; color: #475569; position: relative;
    }
    .tool-btn:hover { background: #f1f5f9; color: #1e293b; }
    .tool-btn.active { background: #eef2ff; border-color: #6366f1; color: #4f46e5; }
    .tool-btn svg { width: 18px; height: 18px; }
    .tool-btn .tooltip {
      position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; font-size: 11px; padding: 3px 8px;
      border-radius: 6px; white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .tool-btn:hover .tooltip { opacity: 1; }

    /* Color picker */
    .color-grid { display: flex; gap: 3px; align-items: center; }
    .color-dot {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: all 0.15s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }

    /* Size slider */
    .size-control { display: flex; align-items: center; gap: 6px; }
    .size-control input[type=range] {
      width: 60px; height: 4px; -webkit-appearance: none; background: #e2e8f0;
      border-radius: 2px; outline: none;
    }
    .size-control input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #6366f1; cursor: pointer; border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .size-preview {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
    }

    /* Canvas */
    #canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      cursor: crosshair; touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <!-- Tools -->
    <button class="tool-btn active" data-tool="pen" title="Pen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/>
      </svg>
      <span class="tooltip">Pen (P)</span>
    </button>
    <button class="tool-btn" data-tool="line" title="Line">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      <span class="tooltip">Line (L)</span>
    </button>
    <button class="tool-btn" data-tool="rect" title="Rectangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
      <span class="tooltip">Rectangle (R)</span>
    </button>
    <button class="tool-btn" data-tool="circle" title="Circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
      <span class="tooltip">Circle (C)</span>
    </button>
    <button class="tool-btn" data-tool="arrow" title="Arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
      <span class="tooltip">Arrow (A)</span>
    </button>
    <button class="tool-btn" data-tool="text" title="Text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
      <span class="tooltip">Text (T)</span>
    </button>
    <button class="tool-btn" data-tool="eraser" title="Eraser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/>
      </svg>
      <span class="tooltip">Eraser (E)</span>
    </button>

    <div class="sep"></div>

    <!-- Colors -->
    <div class="color-grid">
      <div class="color-dot active" data-color="#1e293b" style="background:#1e293b"></div>
      <div class="color-dot" data-color="#ef4444" style="background:#ef4444"></div>
      <div class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></div>
      <div class="color-dot" data-color="#22c55e" style="background:#22c55e"></div>
      <div class="color-dot" data-color="#f59e0b" style="background:#f59e0b"></div>
      <div class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></div>
      <div class="color-dot" data-color="#ec4899" style="background:#ec4899"></div>
    </div>

    <div class="sep"></div>

    <!-- Size -->
    <div class="size-control">
      <div class="size-preview" id="sizePreview"></div>
      <input type="range" id="sizeSlider" min="1" max="20" value="3" />
    </div>

    <div class="sep"></div>

    <!-- Undo / Redo / Clear -->
    <button class="tool-btn" id="undoBtn" title="Undo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
      </svg>
      <span class="tooltip">Undo (Ctrl+Z)</span>
    </button>
    <button class="tool-btn" id="redoBtn" title="Redo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
      </svg>
      <span class="tooltip">Redo (Ctrl+Y)</span>
    </button>
    <button class="tool-btn" id="clearBtn" title="Clear All">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
      </svg>
      <span class="tooltip">Clear (Del)</span>
    </button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // State
    let tool = 'pen';
    let color = '#1e293b';
    let lineWidth = 3;
    let drawing = false;
    let startX, startY;
    let history = [];
    let redoStack = [];
    let currentPath = [];
    let textInput = null;

    // Resize
    function resize() {
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.putImageData(data, 0, 0);
    }
    window.addEventListener('resize', resize);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Save state for undo
    function saveState() {
      history.push(canvas.toDataURL());
      if (history.length > 50) history.shift();
      redoStack = [];
      notifyParent();
    }

    function undo() {
      if (history.length === 0) return;
      redoStack.push(canvas.toDataURL());
      const prev = history.pop();
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        notifyParent();
      };
      img.src = prev;
    }

    function redo() {
      if (redoStack.length === 0) return;
      history.push(canvas.toDataURL());
      const next = redoStack.pop();
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        notifyParent();
      };
      img.src = next;
    }

    function clearCanvas() {
      saveState();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      notifyParent();
    }

    // Notify parent of changes (debounced)
    let saveTimer = null;
    function notifyParent() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        const data = canvas.toDataURL('image/png');
        window.parent.postMessage({ type: 'save-snapshot', snapshot: data }, '*');
      }, 1000);
    }

    // Listen for snapshot load from parent
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'load-snapshot' && e.data.snapshot) {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.src = e.data.snapshot;
      }
    });
    // Tell parent we're ready
    window.parent.postMessage({ type: 'whiteboard-ready' }, '*');

    // Drawing
    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - r.left, y: t.clientY - r.top };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const p = getPos(e);
      startX = p.x; startY = p.y;

      if (tool === 'pen' || tool === 'eraser') {
        currentPath = [p];
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.strokeStyle = tool === 'eraser' ? '#fafbfc' : color;
        ctx.lineWidth = tool === 'eraser' ? lineWidth * 4 : lineWidth;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }

      if (tool === 'text') {
        drawing = false;
        createTextInput(p.x, p.y);
      }
    }

    function draw(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = getPos(e);

      if (tool === 'pen' || tool === 'eraser') {
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        currentPath.push(p);
      }

      if (tool === 'line' || tool === 'rect' || tool === 'circle' || tool === 'arrow') {
        // Preview: restore last state and draw shape
        if (history.length > 0 || currentPath.length === 0) {
          // Use a temp canvas for preview
          const tempData = history.length > 0 ? history[history.length - 1] : null;
          if (!currentPath._saved) {
            currentPath._saved = canvas.toDataURL();
          }
          const img = new Image();
          img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            drawShape(startX, startY, p.x, p.y);
          };
          img.src = currentPath._saved;
        }
      }
    }

    function drawShape(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (tool === 'line') {
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
      } else if (tool === 'rect') {
        ctx.rect(x1, y1, x2 - x1, y2 - y1);
      } else if (tool === 'circle') {
        const rx = Math.abs(x2 - x1) / 2;
        const ry = Math.abs(y2 - y1) / 2;
        const cx = x1 + (x2 - x1) / 2;
        const cy = y1 + (y2 - y1) / 2;
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      } else if (tool === 'arrow') {
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        // Arrowhead
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const headLen = 14;
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
      }
      ctx.stroke();
    }

    function endDraw(e) {
      if (!drawing) return;
      drawing = false;

      if (tool === 'line' || tool === 'rect' || tool === 'circle' || tool === 'arrow') {
        if (e) {
          const p = getPos(e);
          // Restore saved state and draw final shape
          if (currentPath._saved) {
            const img = new Image();
            img.onload = () => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0);
              drawShape(startX, startY, p.x, p.y);
              saveState();
            };
            img.src = currentPath._saved;
            currentPath = [];
            return;
          }
        }
      }

      saveState();
      currentPath = [];
    }

    // Text tool
    function createTextInput(x, y) {
      if (textInput) textInput.remove();
      textInput = document.createElement('input');
      textInput.type = 'text';
      textInput.style.cssText = `
        position:fixed; left:${x}px; top:${y}px; z-index:200;
        font:${lineWidth * 6}px system-ui; color:${color}; background:rgba(255,255,255,0.9);
        border:2px solid #6366f1; border-radius:6px; padding:4px 8px; outline:none;
        min-width:100px;
      `;
      document.body.appendChild(textInput);
      textInput.focus();
      textInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          saveState();
          ctx.font = `${lineWidth * 6}px system-ui, sans-serif`;
          ctx.fillStyle = color;
          ctx.fillText(textInput.value, x, y + lineWidth * 5);
          textInput.remove();
          textInput = null;
          notifyParent();
        }
        if (e.key === 'Escape') { textInput.remove(); textInput = null; }
      });
    }

    // Events
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    // Tool buttons
    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool = btn.dataset.tool;
        canvas.style.cursor = tool === 'eraser' ? 'cell' : tool === 'text' ? 'text' : 'crosshair';
      });
    });

    // Color dots
    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        color = dot.dataset.color;
      });
    });

    // Size slider
    const sizeSlider = document.getElementById('sizeSlider');
    const sizePreview = document.getElementById('sizePreview');
    function updateSizePreview() {
      lineWidth = parseInt(sizeSlider.value);
      sizePreview.innerHTML = `<div style="width:${Math.min(lineWidth*2,28)}px;height:${Math.min(lineWidth*2,28)}px;border-radius:50%;background:${color};"></div>`;
    }
    sizeSlider.addEventListener('input', updateSizePreview);
    updateSizePreview();

    // Buttons
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);
    document.getElementById('clearBtn').addEventListener('click', clearCanvas);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (textInput) return;
      if (e.key === 'p') document.querySelector('[data-tool=pen]').click();
      if (e.key === 'l') document.querySelector('[data-tool=line]').click();
      if (e.key === 'r') document.querySelector('[data-tool=rect]').click();
      if (e.key === 'c') document.querySelector('[data-tool=circle]').click();
      if (e.key === 'a') document.querySelector('[data-tool=arrow]').click();
      if (e.key === 't') document.querySelector('[data-tool=text]').click();
      if (e.key === 'e') document.querySelector('[data-tool=eraser]').click();
      if (e.key === 'Delete') clearCanvas();
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
    });
  </script>
</body>
</html>
