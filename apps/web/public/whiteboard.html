<!DOCTYPE html>
<html lang="en" style="color-scheme: light;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncPad Whiteboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f8f9fa; }
    #root { width: 100%; height: 100%; position: fixed; inset: 0; }
    .loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #f8f9fa; z-index: 9999;
    }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid #6366f1;
      border-top-color: transparent; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading span { margin-left: 12px; color: #64748b; font: 14px system-ui, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading" id="loader">
      <div class="spinner"></div>
      <span>Loading whiteboard…</span>
    </div>
  </div>

  <!-- Load Tldraw from CDN — completely independent of our build system -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "tldraw": "https://esm.sh/tldraw@2.4.9?external=react,react-dom"
    }
  }
  </script>

  <!-- Tldraw CSS from CDN -->
  <link rel="stylesheet" href="https://esm.sh/tldraw@2.4.9/tldraw.css" />

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import { Tldraw } from 'tldraw';

    // Hide the loading spinner
    document.getElementById('loader').style.display = 'none';

    let editorInstance = null;
    let saveTimer = null;
    let hasLoaded = false;

    function isTldrawSnapshot(val) {
      return val && typeof val === 'object' && 'store' in val && 'schema' in val;
    }

    // Listen for snapshot from the parent iframe
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'load-snapshot' && editorInstance && !hasLoaded) {
        hasLoaded = true;
        try {
          const parsed = JSON.parse(event.data.snapshot);
          if (isTldrawSnapshot(parsed)) {
            editorInstance.store.loadSnapshot(parsed);
          }
        } catch (e) {
          console.warn('Failed to load whiteboard snapshot:', e);
        }
      }
    });

    function handleMount(editor) {
      editorInstance = editor;

      // Tell parent we're ready
      window.parent.postMessage({ type: 'whiteboard-ready' }, '*');

      // Debounce-save drawing changes
      editor.store.listen(
        () => {
          if (saveTimer) clearTimeout(saveTimer);
          saveTimer = setTimeout(() => {
            try {
              const snapshot = editor.store.getSnapshot();
              window.parent.postMessage(
                { type: 'save-snapshot', snapshot: JSON.stringify(snapshot) },
                '*'
              );
            } catch (e) { /* ignore serialisation errors */ }
          }, 1500);
        },
        { source: 'user', scope: 'document' }
      );
    }

    // Render Tldraw
    const root = createRoot(document.getElementById('root'));
    root.render(
      React.createElement(Tldraw, { onMount: handleMount })
    );
  </script>
</body>
</html>
